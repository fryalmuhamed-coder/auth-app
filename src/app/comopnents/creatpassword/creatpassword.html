<div class="w-full max-w-md p-8 bg-white">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">Create a New Password</h2>
    <p class="text-gray-500 text-sm">Create a new strong password for your account.</p>
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
      <div class="relative">
        <input


          [type]="showNewPassword ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="********"
          class="w-full p-3 bg-gray-50 border border-gray-100 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-gray-400"
        />
        <button
          type="button"
          (click)="showNewPassword = !showNewPassword "
          class="absolute inset-y-0 right-3 flex items-center text-gray-400"
        >
          <i class="fa-solid" [ngClass]="showNewPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
        </button>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm New Password</label>
      <div class="relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="********"
          class="w-full p-3 bg-gray-50 border border-gray-100 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-gray-400"
        />
        <button
          type="button"
          (click)="toggleConfirmPassword()"
          class="absolute inset-y-0 right-3 flex items-center text-gray-400"
        >
          <i class="fa-solid" [ngClass]="showConfirmPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
        </button>
      </div>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white font-semibold py-4 rounded-md hover:bg-blue-700 transition"
    >
      Reset Password
    </button>

    <div class="text-center mt-6">
      <p class="text-gray-400 text-sm">
        Don't have an account?
        <a routerLink="/auth/register" class="text-blue-600">Create yours</a>
      </p>
    </div>
  </form>
</div>
