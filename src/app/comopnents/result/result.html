<div class="max-w-6xl mx-auto p-6 bg-white">
  <div class="flex items-center gap-4 mb-8">
    <button
      class="bg-white border border-gray-200 p-4 rounded-lg shadow-sm hover:bg-gray-50 transition-colors"
    >
      <i class="fa-solid fa-chevron-left text-blue-600"></i>
    </button>

    <div class="flex-1 flex items-center p-4 bg-blue-600 text-white rounded-lg shadow-md">
      <i class="fa-regular fa-circle-question text-2xl mr-4"></i>
      <h2 class="text-xl italic tracking-wide">[CSS Quiz] Questions</h2>
    </div>
  </div>

  <h2 class="text-[#003B73] text-2xl font-bold mb-10">Results:</h2>

  <div class="grid grid-cols-1 lg:grid-cols-[1.2fr_1.8fr] gap-16 items-start">
    <div class="flex flex-col items-center">
      <div class="relative w-72 h-72 flex items-center justify-center">
        <div
          class="w-full h-full rounded-full transition-all duration-1000 shadow-lg"
          [style.background]="
            'conic-gradient(#198754 0% ' +
            correctPercentage() +
            '%, #dc3545 ' +
            correctPercentage() +
            '% 100%)'
          "
        ></div>

        <div
          class="absolute w-[75%] h-[75%] bg-white rounded-full flex flex-col items-center justify-center"
        >
          <span class="text-4xl font-bold text-[#003B73]">{{ correctPercentage() }}%</span>
          <span class="text-gray-400 text-sm mt-1">Success Rate</span>
        </div>
      </div>

      <div class="mt-10 space-y-4 self-start ml-12">
        <div class="flex items-center text-lg font-bold">
          <span class="w-5 h-5 bg-green-600 rounded mr-3"></span>
          <span class="text-gray-700">Correct: {{ correctCount() }}</span>
        </div>
        <div class="flex items-center text-lg font-bold">
          <span class="w-5 h-5 bg-red-600 rounded mr-3"></span>
          <span class="text-gray-700">Incorrect: {{ incorrectCount() }}</span>
        </div>
      </div>
    </div>

    <div class="space-y-8 max-h-600px overflow-y-auto pr-4">
      @for (item of wrongQuestionsOnly(); track $index) {
        <div class="border-b border-gray-100 pb-6">
          <h4 class="text-blue-600 text-lg font-bold mb-4">{{ item.question }}</h4>

          <div class="space-y-3">
            <div class="flex items-center p-4 bg-red-50 border border-red-100 rounded-xl relative">
              <div
                class="w-5 h-5 border-2 border-red-500 rounded-full flex items-center justify-center mr-3"
              >
                <div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
              </div>
              <span class="text-red-700 font-medium">{{ item.selected }}</span>
              <i class="fa-solid fa-circle-xmark text-red-500 absolute right-4"></i>
            </div>

            <div class="flex items-center p-4 bg-white border border-gray-100 rounded-xl">
              <div class="w-5 h-5 border-2 border-gray-300 rounded-full mr-3"></div>
              <span class="text-gray-500 font-medium">{{ item.correct }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="flex justify-between mt-16 pt-8 border-t border-gray-100">
    <button
      routerLink="/quiz"
      class="flex items-center px-50 bg-gray-300 rounded-lg text-gray-600 font-bold hover:bg-gray-400 transition-colors"
    >
      <i class="fa-solid fa-rotate-right mr-2"></i> Restart
    </button>
    <button
      class="px-50 py-3 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide mr-2 lucide-folder-search"
      >
        <path
          d="M10.7 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v4.1"
        />
        <path d="m21 21-1.9-1.9" />
        <circle cx="17" cy="17" r="3" />
      </svg>

      Explore
    </button>
  </div>
</div>
