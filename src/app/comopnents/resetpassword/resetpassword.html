<div class="w-full max-w-md p-8 bg-white">
  <button
    routerLink="/auth/forgot-password"
    class="mb-8 p-2 border border-gray-100 rounded text-gray-400 hover:bg-gray-50"
  >
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <div class="space-y-6">
    <h2 class="text-3xl font-bold text-gray-900">Password Reset Sent</h2>

    <div class="text-gray-500 text-sm leading-relaxed space-y-4">
      <p>
        We have sent a password reset link to:
        <a routerLink="/auth/creatpassword" class="text-blue-600 font-medium cursor-pointer">
          user@example.com</a
        >.
      </p>

      <p>Please check your inbox and follow the instructions to reset your password.</p>

      <p>If you don't see the email within a few minutes, check your spam or junk folder.</p>
    </div>

    <div class="pt-8 border-t border-gray-50 text-center">
      <p class="text-gray-400 text-sm">
        Don't have an account?
        <a routerLink="/auth/creatpassword" class="text-blue-600">Create yours</a>
      </p>
    </div>
  </div>
</div>
