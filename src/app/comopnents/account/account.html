<div class="max-w-6xl mx-auto p-6 bg-white">
  <div class="flex items-center p-4 bg-blue-600 text-white rounded-lg mb-10 shadow-sm">
    <div class="bg-white/10 p-2 rounded-lg mr-4">
      <i class="fa-regular fa-user text-xl"></i>
    </div>
    <h2 class="text-xl font-bold">Account Settings</h2>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[250px_1fr] gap-12">
    <div class="flex flex-col h-full space-y-2 border-r border-gray-100 pr-8">
      <button
        (click)="setTab('profile')"
        [class.text-blue-600]="activeTab() === 'profile'"
        [class.bg-blue-50]="activeTab() === 'profile'"
        class="w-full flex items-center p-3 rounded-lg font-semibold transition-all hover:bg-gray-50 group"
      >
        <i
          class="fa-regular fa-circle-user mr-3 text-lg"
          [class.text-blue-600]="activeTab() === 'profile'"
        ></i>
        Profile
      </button>

      <button
        (click)="setTab('password')"
        [class.text-blue-600]="activeTab() === 'password'"
        [class.bg-blue-50]="activeTab() === 'password'"
        class="w-full flex items-center p-3 rounded-lg font-semibold transition-all text-gray-400 hover:bg-gray-50 group"
      >
        <i
          class="fa-solid fa-lock mr-3 text-lg"
          [class.text-blue-600]="activeTab() === 'password'"
        ></i>
        Change Password
      </button>

      <div class="mt-auto pt-20">
        <button
          (click)="logout()"
          routerLink="/auth/login"
          class="flex items-center text-red-500 py-3 rounded-lg hover:text-red-700 bg-red-100/50 transition-colors px-10"
        >
          <i class="fa-solid fa-arrow-right-from-bracket mr-3"></i> Logout
        </button>
      </div>
    </div>

    <div>
      @if (activeTab() === 'profile') {
        <div class="space-y-8 animate-in fade-in duration-300">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="block text-sm font-bold text-gray-600">First name</label>
              <input
                type="text"
                [(ngModel)]="userProfile.firstName"
                class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-sm font-bold text-gray-600">Last name</label>
              <input
                type="text"
                [(ngModel)]="userProfile.lastName"
                class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="block text-sm">Username</label>
            <input
              type="text"
              [(ngModel)]="userProfile.username"
              class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-bold">Email</label>
            <input
              type="email"
              [(ngModel)]="userProfile.email"
              class="w-full p-3 border-2 border-gray-200 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600">Phone</label>
            <div
              class="flex items-center bg-gray-50 rounded-lg overflow-hidden group focus-within:ring-2 focus-within:ring-blue-500 transition-all"
            >
              <div class="px-4 py-3 bg-gray-100 flex items-center border-gray-200 text-gray-500">
                <span class="mr-2 text-xl">🇪🇬</span> (+20)
              </div>
              <input
                type="text"
                [(ngModel)]="userProfile.phone"
                class="border-2 border-gray-200 flex-1 p-3 bg-transparent outline-none"
              />
            </div>
          </div>

          <div class="flex justify-between items-center pt-10 mt-6">
            <button
              (click)="openModal()"
              class="text-red-500 border-2 border-red-400 px-12 py-3 rounded-lg bg-red-100/50 hover:text-red-700 transition-colors"
            >
              Delete My Account
            </button>

            @if (showDeleteModal()) {
              <div
                class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50"
              >
                <div
                  class="bg-white rounded-lg shadow-2xl max-w-md w-full p-8 text-center animate-in zoom-in duration-200"
                >
                  <div
                    class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"
                  >
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                  </div>

                  <h3 class="text-xl font-bold text-gray-800 mb-2">
                    Are you sure you want to delete your account?
                  </h3>
                  <p class="text-gray-500 mb-8">This action is permanent and cannot be undone.</p>

                  <div class="flex gap-4">
                    <button
                      (click)="closeModal()"
                      class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-bold hover:bg-gray-200 transition-all"
                    >
                      Cancel
                    </button>
                    <button
                      (click)="confirmDelete()"
                      class="flex-1 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition-all"
                    >
                      Yes, delete
                    </button>
                  </div>

                  <button
                    (click)="closeModal()"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"
                  >
                    <i class="fa-solid fa-xmark text-xl"></i>
                  </button>
                </div>
              </div>
            }
            <button
              (click)="saveChanges()"
              class="px-12 py-3 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all"
            >
              Save Changes
            </button>
          </div>
        </div>
      }

      @if (activeTab() === 'password') {
        <div class="max-w-md space-y-6 animate-in slide-in-from-right-4 duration-300">
          <h3 class="text-xl font-bold text-gray-800 mb-6">Security Settings</h3>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600">Current Password</label>
            <input
              type="password"
              placeholder="******"
              class="w-full p-3 border-2 border-gray-200 bg-gray-50 text-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600">New Password</label>
            <input
              type="password"
              placeholder="******"
              class="w-full p-3 border-2 border-gray-200 text-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-600"> confirm New Password</label>
            <input
              type="password"
              placeholder="******"
              class="w-full p-3 border-2 border-gray-200 text-gray-300 bg-gray-50 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="space-y-4 max-w-md mt-6">
            @if (errorMessage()) {
              <div
                class="relative flex items-center justify-center p-3 border border-red-200 bg-red-50/50 rounded-lg animate-in fade-in zoom-in duration-200"
              >
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-1">
                  <div
                    class="w-6 h-6 border border-red-200 rounded-full flex items-center justify-center bg-white"
                  >
                    <i class="fa-solid fa-xmark text-[10px] text-red-500"></i>
                  </div>
                </div>
                <span class="text-red-600 text-sm font-medium">{{ errorMessage() }}</span>
              </div>
            }
          </div>

          <button
            (click)="updatePassword()"
            class="px-8 py-3 bg-blue-600 text-white rounded-lg font-bold shadow-md w-full md:w-auto"
          >
            Update Password
          </button>
        </div>
      }
    </div>
  </div>
</div>
