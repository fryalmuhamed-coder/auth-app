<div class="w-full max-w-md p-8 bg-white">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">Forgot Password</h2>
    <p class="text-gray-500 text-sm leading-relaxed">
      Don't worry, we will help you recover your account.
    </p>
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
      <input
        formControlName="email"
        type="email"
        placeholder="user@example.com"
        class="w-full p-3 bg-gray-50 border border-gray-100 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-gray-400"
      />

      @if (forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.invalid) {
        <p class="text-red-500 text-xs mt-1 italic">Please enter a valid email address</p>
      }
    </div>

    <button
      type="submit"
      routerLink="/auth/Resetpassword"
      class="w-full bg-blue-600 text-white font-semibold py-4 rounded-md hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-2"
    >
      <span>Continue</span>
      <i class="fa-solid fa-arrow-right-long ml-2"></i>
    </button>

    <div class="text-center mt-8">
      <p class="text-gray-500 text-sm">
        Don't have an account?
        <a routerLink="/auth/register" class="text-blue-600 ml-1">Create yours</a>
      </p>
    </div>
  </form>
</div>
