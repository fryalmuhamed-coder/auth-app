<div class="flex h-screen bg-white overflow-hidden">
  <aside class="w-72 bg-blue-100/50 border-r border-gray-100 flex flex-col shadow-sm">
    <div class="p-5">
      <img src="images/ele.png" class="invert opacity-70 w-44" alt="" />

      <div class="flex items-center gap-2 mt-3">
        <div class="p-1.5 rounded-lg flex items-center justify-center w-fit text-blue-600">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-folder-code-icon lucide-folder-code"
          >
            <path d="M10 10.5 8 13l2 2.5" />
            <path d="m14 10.5 2 2.5-2 2.5" />
            <path
              d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z"
            />
          </svg>
        </div>
        <span class="text-base font-bold text-blue-600">Exam App</span>
      </div>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a
        routerLink="/dashboard/diblomas"
        routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-100"
        class="flex items-center px-6 py-4 text-gray-500 rounded-xl transition-all duration-200 group border-2 border-transparent hover:text-blue-600 hover:border-blue-600 hover:border-2 hover:border-bg-blue-600 hover:bg-blue-50"
      >
        <i class="fa-solid fa-graduation-cap mr-4 text-sm"></i>
        <span class="">Diplomas</span>
      </a>

      <a
        routerLink="/dashboard/account"
        routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-100"
        class="flex items-center px-6 py-4 text-gray-500 rounded-xl transition-all duration-100 group border-2 border-transparent hover:text-blue-600 hover:border-blue-600 hover:border-2 hover:border-bg-blue-600 hover:bg-blue-50"
      >
        <i class="fa-solid fa-user-gear mr-4 text-sm"></i>
        <span class="">Account Settings</span>
      </a>
    </nav>

    <!--  -->
    <div class="mt-auto p-4 border-t border-gray-100 relative">
      @if (showUserMenu()) {
        <div
          class="absolute bottom-full left-4 mb-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 animate-in slide-in-from-bottom-2 duration-200 z-50"
        >
          <a
            routerLink="/dashboard/account"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors"
          >
            <i class="fa-regular fa-circle-user mr-3"></i> Account
          </a>
          <button
            routerLink="/auth/login"
            class="w-full flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors"
          >
            <i class="fa-solid fa-arrow-right-from-bracket mr-3"></i> Logout
          </button>
        </div>
      }

      <div class="flex items-center justify-between group">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg overflow-hidden border border-gray-200">
            <img src="images/avatar.jpg" alt="Profile" class="w-full h-full object-cover" />
          </div>

          <div class="flex flex-col">
            <span class="text-sm font-bold text-gray-900">Firstname</span>
            <span class="text-[10px] text-gray-500 truncate w-32">user-email@example.com</span>
          </div>
        </div>

        <button
          (click)="toggleUserMenu()"
          class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all"
        >
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
