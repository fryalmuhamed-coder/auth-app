<div class="max-w-5xl mx-auto p-6">
  <div class="flex items-center gap-4 mb-8">
    <button
      class="bg-white border border-gray-200 p-4 rounded-lg shadow-sm hover:bg-gray-50 transition-colors"
    >
      <i class="fa-solid fa-chevron-left text-blue-600"></i>
    </button>

    <div class="flex-1 flex items-center p-4 bg-blue-600 text-white rounded-lg shadow-md">
      <i class="fa-regular fa-circle-question text-2xl mr-4"></i>
      <h2 class="text-xl italic tracking-wide">[CSS Quiz] Questions</h2>
    </div>
  </div>

  <div class="flex justify-between items-center mb-2">
    <span class="text-blue-600 text-sm">Question {{ currentQuestionIndex() + 1 }} of 25</span>
  </div>
  <div class="w-full bg-gray-200 rounded-full h-2.5 mb-8">
    <div
      class="bg-blue-600 h-2.5 rounded-full transition-all duration-300"
      [style.width.%]="((currentQuestionIndex() + 1) / 25) * 100"
    ></div>
  </div>

  <div class="max-w-5xl mx-auto p-5">
    <h3 class="text-[#003B73] text-2xl mb-8">
      {{ currentQuestion().text }}
    </h3>

    <div class="space-y-4 mb-12">
      @for (option of currentQuestion().options; track option) {
        <label
          class="flex items-center p-4 bg-white border border-gray-100 rounded-xl cursor-pointer hover:bg-blue-50 transition-all shadow-sm"
        >
          <input type="radio" name="quiz" [value]="option" class="w-5 h-5 accent-blue-600" />
          <span class="ml-4 text-gray-700 font-medium">{{ option }}</span>
        </label>
      }
    </div>
  </div>
</div>

<div class="flex justify-between items-center pt-2 px-6">
  <button
    (click)="previousQuestion()"
    [disabled]="currentQuestionIndex() === 0"
    class="px-50 py-2 text-gray-500 bg-gray-300 hover:bg-gray-400 transition-all rounded-lg flex items-center disabled:opacity-50"
  >
    <i class="fa-solid fa-chevron-left mr-2"></i> Previous
  </button>

  <div class="relative w-16 h-16 flex items-center justify-center">
    <svg class="w-full h-full transform -rotate-90">
      <circle
        cx="32"
        cy="32"
        r="28"
        stroke="currentColor"
        stroke-width="4"
        fill="transparent"
        class="text-gray-200"
      />
      <circle
        cx="32"
        cy="32"
        r="28"
        stroke="currentColor"
        stroke-width="4"
        fill="transparent"
        class="text-blue-600 transition-all duration-1000"
        stroke-dasharray="175"
        [attr.stroke-dashoffset]="175 - (175 * timeLeft()) / 781"
      />
    </svg>
    <span class="absolute text-sm font-bold">{{ formattedTime() }}</span>
  </div>

  @if (currentQuestionIndex() < 24) {
    <button
      (click)="nextQuestion()"
      class="px-50 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all flex items-center shadow-lg shadow-blue-200"
    >
      Next <i class="fa-solid fa-chevron-right ml-2"></i>
    </button>
  } @else {
    <button
      routerLink="/dashboard/result"
      class="px-50 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all flex items-center shadow-lg shadow-green-200"
    >
      Finish
    </button>
  }
</div>
