<div class="w-full max-w-xl p-8 bg-white">
  <h2 class="text-3xl font-bold text-gray-900 mb-8">Create Account</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">First name</label>
        <input
          formControlName="fullName"
          type="text"
          placeholder="fryal"
          class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Last name</label>
        <input
          type="text"
          placeholder="mohamed"
          class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
      <input
        type="text"
        placeholder="user123"
        class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
      <input
        formControlName="email"
        type="email"
        placeholder="user@example.com"
        class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Phone</label>
      <div class="relative flex">
        <div
          class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none border-r pr-2 border-gray-200"
        >
          <span class="text-xs ml-1 text-gray-500">EG(+20)</span>
          <i class="fa-solid fa-chevron-down text-[8px] ml-1 text-gray-400"></i>
        </div>
        <input
          type="text"
          placeholder="1012345678"
          class="w-full pl-28 p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
      <div class="relative">
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="********"
          class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          type="button"
          (click)="toggleNewPassword()"
          class="absolute inset-y-0 right-3 flex items-center text-gray-400"
        >
          <i class="fa-solid" [ngClass]="showNewPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
        </button>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
      <div class="relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="********"
          class="w-full p-3 text-gray-400 bg-gray-50 border border-gray-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          type="button"
          (click)="toggleConfirmPassword()"
          class="absolute inset-y-0 right-3 flex items-center text-gray-400"
        >
          <i class="fa-solid" [ngClass]="showConfirmPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
        </button>
      </div>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white font-semibold py-3 rounded-md hover:bg-blue-700 transition duration-200 mt-4 shadow-sm"
    >
      Create Account
    </button>

    <div class="text-center mt-6">
      <p class="text-gray-500 text-sm">
        Already have an account?
        <a routerLink="/auth/login" class="text-blue-600 ml-1">Login</a>
      </p>
    </div>
  </form>
</div>
