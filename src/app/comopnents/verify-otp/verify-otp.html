<div class="w-full max-w-md p-8 bg-white">
  <button routerLink="/auth/register" class="mb-8 text-gray-400 hover:text-gray-600">
    <i class="fa-solid fa-arrow-left text-xl"></i>
  </button>

  <h2 class="text-3xl font-bold text-gray-900 mb-2">Verify OTP</h2>
  <p class="text-gray-500 mb-8">
    Please enter the 6-digit code we have sent to:
    <span class="text-gray-900 font-medium">user@example.com</span>
    <button class="text-blue-600 ml-1 hover:underline">Edit</button>
  </p>

  <form [formGroup]="otpForm" (ngSubmit)="onVerify()" class="space-y-8">
    <div class="flex justify-between gap-2">
      @for (index of [0, 1, 2, 3, 4, 5]; track index) {
        <input
          type="tel"
          maxLength="1"
          inputmode="numeric"
          class="w-12 h-14 text-center text-xl font-bold border border-gray-200 rounded-lg bg-gray-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
          (keyup)="moveFocus($event, index)"
          (keypress)="onlyNumbers($event)"
        />
      }
    </div>

    <p class="text-center text-sm text-gray-500">
      You can request another code in: <span class="text-gray-900 font-bold">60s</span>
    </p>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white font-semibold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200"
    >
      Verify Code
    </button>

    <div class="text-center">
      <p class="text-gray-500 text-sm">
        Already have an account?
        <a routerLink="/auth/login" class="text-blue-600 font-bold ml-1">Login</a>
      </p>
    </div>
  </form>
</div>
